<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英语单词本 📚</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #faf8f5;
    --sidebar-bg: #f0ede8;
    --card-bg: #ffffff;
    --text: #2c2c2c;
    --dim: #8a8580;
    --accent: #5b7cff;
    --accent-light: rgba(91,124,255,0.08);
    --border: rgba(0,0,0,0.06);
    --shadow: 0 8px 24px rgba(0,0,0,0.06);
  }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
  }
  .layout { display: flex; height: 100dvh; }
  .sidebar {
    width: 340px;
    min-width: 280px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-header p {
    margin-top: 6px;
    font-size: 12px;
    color: var(--dim);
    line-height: 1.6;
  }
  .search-bar { padding: 14px 16px 10px; }
  .search-bar input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font: inherit;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .list-container {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .list-item {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  .list-item:hover { background: rgba(0,0,0,0.02); }
  .list-item.active { background: var(--card-bg); }
  .list-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .word-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
  }
  .word {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .date {
    font-size: 11px;
    color: var(--dim);
    white-space: nowrap;
  }
  .meaning-preview {
    margin-top: 6px;
    font-size: 12px;
    color: var(--dim);
    line-height: 1.5;
  }
  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .content-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 28px 80px;
  }
  .hero {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    box-shadow: var(--shadow);
  }
  .hero-top {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .hero h2 {
    font-size: 36px;
    line-height: 1.1;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 700;
  }
  .added-date {
    font-size: 12px;
    color: var(--dim);
  }
  .phonetics {
    margin-top: 18px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }
  .phonetic-card {
    background: rgba(0,0,0,0.025);
    border-radius: 12px;
    padding: 10px 12px;
  }
  .phonetic-card .label {
    font-size: 10px;
    color: var(--dim);
    margin-bottom: 3px;
  }
  .phonetic-card .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--dim);
  }
  .section {
    margin-top: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
  }
  .section h3 {
    font-size: 15px;
    margin-bottom: 12px;
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    font-size: 12px;
    padding: 6px 10px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 999px;
  }
  ul.clean {
    list-style: none;
    display: grid;
    gap: 10px;
  }
  ul.clean li {
    line-height: 1.7;
    color: var(--text);
  }
  .example {
    padding: 14px 16px;
    border-radius: 12px;
    background: #fbfbfd;
    border: 1px solid var(--border);
  }
  .example + .example { margin-top: 12px; }
  .example .en {
    font-size: 15px;
    line-height: 1.7;
  }
  .example .zh {
    margin-top: 6px;
    font-size: 13px;
    color: var(--dim);
    line-height: 1.6;
  }
  .empty {
    padding: 48px 24px;
    text-align: center;
    color: var(--dim);
  }
  @media (max-width: 840px) {
    body { overflow: auto; height: auto; }
    .layout { display: block; height: auto; }
    .sidebar { width: 100%; min-width: 0; border-right: 0; border-bottom: 1px solid var(--border); }
    .content { overflow: visible; }
    .content-inner { padding: 20px 16px 40px; }
    .hero { padding: 22px 18px; }
    .hero h2 { font-size: 28px; }
  }
</style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>📚 英语单词本</h1>
        <p>每天把不认识的词发过来，这里会持续更新。包含词汇、短语、例句、音标。</p>
      </div>
      <div class="search-bar">
        <input id="searchInput" type="text" placeholder="搜索单词、短语、释义..." />
      </div>
      <div id="listContainer" class="list-container"></div>
    </aside>
    <main class="content">
      <div class="content-inner">
        <div id="detail"></div>
      </div>
    </main>
  </div>
<script>
  let words = [];
  let filtered = [];
  let selectedIndex = 0;

  function escapeHtml(str = '') {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderList() {
    const container = document.getElementById('listContainer');
    if (!filtered.length) {
      container.innerHTML = '<div class="empty">没找到匹配的词。</div>';
      document.getElementById('detail').innerHTML = '<div class="empty">换个关键词试试。</div>';
      return;
    }
    if (selectedIndex >= filtered.length) selectedIndex = 0;
    container.innerHTML = filtered.map((item, idx) => `
      <div class="list-item ${idx === selectedIndex ? 'active' : ''}" data-index="${idx}">
        <div class="word-row">
          <div class="word">${escapeHtml(item.word)}</div>
          <div class="date">${escapeHtml(item.addedDate || '')}</div>
        </div>
        <div class="meaning-preview">${escapeHtml((item.meanings || [])[0] || '')}</div>
      </div>
    `).join('');

    container.querySelectorAll('.list-item').forEach(el => {
      el.addEventListener('click', () => {
        selectedIndex = Number(el.dataset.index);
        renderList();
        renderDetail();
      });
    });
  }

  function renderDetail() {
    const root = document.getElementById('detail');
    const item = filtered[selectedIndex];
    if (!item) {
      root.innerHTML = '<div class="empty">还没有内容。</div>';
      return;
    }

    const phoneticCards = [
      ['形容词英式', item.phonetic?.uk],
      ['形容词美式', item.phonetic?.us],
      ['动词英式', item.phonetic?.verbUk],
      ['动词美式', item.phonetic?.verbUs]
    ].filter(([, value]) => value);

    root.innerHTML = `
      <section class="hero">
        <div class="hero-top">
          <div>
            <h2>${escapeHtml(item.word)}</h2>
            <div class="tags" style="margin-top:12px;">
              ${(item.partOfSpeech || []).map(p => `<span class="tag">${escapeHtml(p)}</span>`).join('')}
            </div>
          </div>
          <div class="added-date">收录于 ${escapeHtml(item.addedDate || '')}</div>
        </div>
        <div class="phonetics">
          ${phoneticCards.map(([label, value]) => `
            <div class="phonetic-card">
              <div class="label">${escapeHtml(label)}</div>
              <div class="value">${escapeHtml(value)}</div>
            </div>
          `).join('')}
        </div>
      </section>

      <section class="section">
        <h3>释义</h3>
        <ul class="clean">
          ${(item.meanings || []).map(m => `<li>${escapeHtml(m)}</li>`).join('')}
        </ul>
      </section>

      <section class="section">
        <h3>常见短语 / 搭配</h3>
        <div class="tags">
          ${(item.phrases || []).map(p => `<span class="tag">${escapeHtml(p)}</span>`).join('')}
        </div>
      </section>

      <section class="section">
        <h3>例句</h3>
        ${(item.examples || []).map(ex => `
          <div class="example">
            <div class="en">${escapeHtml(ex.en)}</div>
            <div class="zh">${escapeHtml(ex.zh)}</div>
          </div>
        `).join('')}
      </section>

      ${item.note ? `
      <section class="section">
        <h3>补充</h3>
        <ul class="clean"><li>${escapeHtml(item.note)}</li></ul>
      </section>` : ''}
    `;
  }

  function applySearch(keyword) {
    const q = keyword.trim().toLowerCase();
    filtered = !q ? [...words] : words.filter(item => {
      const haystack = [
        item.word,
        ...(item.meanings || []),
        ...(item.phrases || []),
        ...(item.examples || []).flatMap(ex => [ex.en, ex.zh]),
        item.note
      ].join(' ').toLowerCase();
      return haystack.includes(q);
    });
    selectedIndex = 0;
    renderList();
    renderDetail();
  }

  async function init() {
    const res = await fetch('wordbook-data.json');
    words = await res.json();
    words.sort((a, b) => (b.addedDate || '').localeCompare(a.addedDate || '') || a.word.localeCompare(b.word));
    filtered = [...words];
    renderList();
    renderDetail();
  }

  document.getElementById('searchInput').addEventListener('input', e => applySearch(e.target.value));
  init().catch(err => {
    document.getElementById('detail').innerHTML = `<div class="empty">加载失败: ${escapeHtml(String(err))}</div>`;
  });
</script>
</body>
</html>
